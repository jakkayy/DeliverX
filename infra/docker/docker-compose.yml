version: "3.9"

networks:
  grab-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  zookeeper_data:

services:

  # ──────────────────────────────────────────
  # PostgreSQL + PostGIS
  # ──────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: grab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grab_db}
      POSTGRES_USER: ${POSTGRES_USER:-grab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grab_secret_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - grab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grab_user} -d ${POSTGRES_DB:-grab_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: grab-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - grab-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # Zookeeper (Kafka dependency)
  # ──────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: grab-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Apache Kafka
  # ──────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: grab-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - grab-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────
  # Kafka UI (Dev tool)
  # ──────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: grab-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # pgAdmin (Dev tool)
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: grab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@grab.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────
  api-gateway:
    build:
      context: ../../backend/api-gateway
      dockerfile: Dockerfile
    container_name: grab-api-gateway
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      - auth-service
      - user-service
      - order-service
      - tracking-service
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Auth Service
  # ──────────────────────────────────────────
  auth-service:
    build:
      context: ../../backend/auth-service
      dockerfile: Dockerfile
    container_name: grab-auth-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-grab_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-grab_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-grab_secret_password}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
    ports:
      - "${AUTH_SERVICE_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # User Service
  # ──────────────────────────────────────────
  user-service:
    build:
      context: ../../backend/user-service
      dockerfile: Dockerfile
    container_name: grab-user-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-grab_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-grab_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-grab_secret_password}
    ports:
      - "${USER_SERVICE_PORT:-8082}:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Order Service
  # ──────────────────────────────────────────
  order-service:
    build:
      context: ../../backend/order-service
      dockerfile: Dockerfile
    container_name: grab-order-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-grab_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-grab_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-grab_secret_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${ORDER_SERVICE_PORT:-8083}:8083"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Tracking Service
  # ──────────────────────────────────────────
  tracking-service:
    build:
      context: ../../backend/tracking-service
      dockerfile: Dockerfile
    container_name: grab-tracking-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret_password}
    ports:
      - "${TRACKING_SERVICE_PORT:-8084}:8084"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Payment Service
  # ──────────────────────────────────────────
  payment-service:
    build:
      context: ../../backend/payment-service
      dockerfile: Dockerfile
    container_name: grab-payment-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-grab_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-grab_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-grab_secret_password}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${PAYMENT_SERVICE_PORT:-8085}:8085"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - grab-network

  # ──────────────────────────────────────────
  # Notification Service
  # ──────────────────────────────────────────
  notification-service:
    build:
      context: ../../backend/notification-service
      dockerfile: Dockerfile
    container_name: grab-notification-service
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-8086}:8086"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - grab-network
